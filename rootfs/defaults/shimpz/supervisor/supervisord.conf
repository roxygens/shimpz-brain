; Shimpz's APP process manager. Runs as the unprivileged Brain user (abc), launched by the explicit
; svc-shimpz-headless/autostart path. Image-baked infra stays in s6/autostart; THIS keeps Shimpz's OWN web
; apps alive — one port each, under /config/workspace/projects. Shimpz never edits this file:
; it registers apps with `shimpz-app deploy`, which drops a program file in apps/ and runs
; `supervisorctl update`. Everything lives under the persistent $SHIMPZ_HOME so it survives reboots.
[unix_http_server]
file=/config/.shimpz/supervisor/supervisor.sock
chmod=0700

[supervisord]
logfile=/config/.shimpz/logs/supervisord.log
logfile_maxbytes=10MB
logfile_backups=3
pidfile=/config/.shimpz/supervisor/supervisord.pid
childlogdir=/config/.shimpz/logs
nodaemon=true

[rpcinterface:supervisor]
supervisor.rpcinterface_factory = supervisor.rpcinterface:make_main_rpcinterface

[supervisorctl]
serverurl=unix:///config/.shimpz/supervisor/supervisor.sock

[include]
files = /config/.shimpz/supervisor/apps/*.conf
